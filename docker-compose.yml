services:
  backend:
    build:
      context: ./backend
    environment:
      OPENAI_API_KEY: ""
      JWT_SECRET_KEY: "ci-test-secret"
      PORT: "8000"
      DATABASE_URL: sqlite:////data/todo.db
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/data
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs')\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    volumes:
      - ./frontend-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  e2e:
    build:
      context: ./e2e
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    environment:
      BASE_URL: http://frontend
      AUTH_URL: http://backend:8000
      CHROME_HEADLESS: "1"
    command: pytest --tb=short -v --junitxml=/artifacts/test-results.xml
    volumes:
      - ./artifacts:/artifacts
      - ./artifacts/screenshots:/app/screenshots

volumes:
  backend-data: