name: E2E Tests - Full Stack

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: Backend unit tests (todo_ai_worshop)
  # ──────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: marcin119a/todo_ai_worshop
          path: backend

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run DB migrations
        working-directory: backend
        run: alembic upgrade head
        env:
          # Brak klucza → mock AI service (fallback wbudowany w aplikację)
          OPENAI_API_KEY: ""

      - name: Run unit tests
        working-directory: backend
        run: pytest --tb=short -v
        env:
          OPENAI_API_KEY: ""

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Frontend build (todo_workshop_frontend)
  # ──────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: marcin119a/todo_workshop_frontend
          path: frontend

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  # JOB 3: E2E Tests (todo_selenium) — wymaga backendu + frontendu
  # ──────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Selenium Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      # ── Pobierz wszystkie trzy repozytoria ──────────────────────
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: marcin119a/todo_ai_worshop
          path: backend

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: marcin119a/todo_workshop_frontend
          path: frontend

      - name: Checkout e2e tests
        uses: actions/checkout@v4
        with:
          repository: marcin119a/todo_selenium
          path: e2e

      # ── Backend setup ────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run DB migrations
        working-directory: backend
        run: alembic upgrade head
        env:
          OPENAI_API_KEY: ""

      - name: Start backend server
        working-directory: backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "Backend PID: $!"
        env:
          OPENAI_API_KEY: ""

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/docs > /dev/null 2>&1; then
              echo "Backend is up after ${i}s"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 1
          done

      # ── Frontend setup ──────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Start frontend dev server
        working-directory: frontend
        run: |
          npm run dev &
          echo "Frontend PID: $!"

      - name: Wait for frontend to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend is up after ${i}s"
              break
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 1
          done

      # ── Chrome / Selenium setup ─────────────────────────────────
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install E2E test dependencies
        working-directory: e2e
        run: |
          pip install -r requirements.txt

      # ── Run E2E tests ───────────────────────────────────────────
      - name: Run Selenium E2E tests
        working-directory: e2e
        run: |
          pytest --tb=short -v \
            --junitxml=test-results.xml
        env:
          DISPLAY: ":99"

      # ── Artefakty ───────────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: e2e/test-results.xml
          retention-days: 7

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-on-failure
          path: e2e/screenshots/
          retention-days: 7
