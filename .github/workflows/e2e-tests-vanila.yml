name: E2E Tests - Docker Compose - Vannila

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Build Images and Run E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout orchestrator
        uses: actions/checkout@v4

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: marcin119a/todo_ai_worshop
          path: backend

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: marcin119a/todo_workshop_frontend
          path: frontend

      - name: Checkout e2e tests
        uses: actions/checkout@v4
        with:
          repository: marcin119a/todo_selenium
          path: e2e

      - name: Prepare artifacts directory
        run: mkdir -p artifacts/screenshots

      - name: Show Docker info
        run: |
          docker --version
          docker compose version

      - name: Build images and run stack
        run: docker compose up --build --abort-on-container-exit --exit-code-from e2e

      - name: Save docker compose logs
        if: always()
        run: docker compose logs --no-color > artifacts/docker-compose.log

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: artifacts/test-results.xml
          if-no-files-found: warn
          retention-days: 7

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-on-failure
          path: artifacts/screenshots/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload compose logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: artifacts/docker-compose.log
          if-no-files-found: warn
          retention-days: 7

      - name: Stop and remove containers
        if: always()
        run: docker compose down -v --remove-orphans
